services:
  # Banco de dados local — substitui o Supabase enquanto você desenvolve
  db:
    image: postgres:17-alpine
    container_name: rpg-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: rpg
      POSTGRES_DB: rpg
    ports:
      - "5432:5432"
    volumes:
      - rpg-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg -d rpg"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Servidor SMTP "fake" — captura os emails e mostra numa UI no navegador.
  # Nada sai da sua máquina; serve pra ver o email de OTP sem Resend/Hostinger.
  mailpit:
    image: axllent/mailpit:latest
    container_name: rpg-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # UI web  -> http://localhost:8025
      - "1025:1025"   # SMTP    -> onde o backend "envia"

volumes:
  rpg-db-data:
